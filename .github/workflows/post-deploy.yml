name: Post-Deploy Verification

# Runs automatically after every Vercel deployment succeeds
# Also runnable manually for ad-hoc testing
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test against'
        default: 'https://zoobicon.com'

jobs:
  smoke-tests:
    name: Smoke Tests
    # Only run on production deployments (preview URLs are auth-protected and return 401)
    # or on manual triggers
    if: github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run smoke tests against live site
        run: bash scripts/smoke-test.sh "$SMOKE_URL"
        env:
          SMOKE_URL: ${{ github.event.deployment_status.target_url || inputs.url || 'https://zoobicon.com' }}

  gatetest-live:
    name: GateTest E2E (live deploy)
    # Replaces the previous Playwright job — we use our own product.
    # Only run on production deployments (preview URLs are auth-protected)
    # or on manual triggers.
    if: github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run GateTest against live site
        if: ${{ env.GATE_TEST_API_URL != '' }}
        run: |
          node -e "
          const https = require('https');
          const url = new URL(process.env.GATE_TEST_API_URL);
          const body = JSON.stringify({
            repo_url: 'https://github.com/${{ github.repository }}',
            tier: 'e2e',
            ref: '${{ github.sha }}',
            target: process.env.LIVE_URL,
          });
          const req = https.request({
            hostname: url.hostname,
            port: url.port || 443,
            path: url.pathname,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': process.env.GATE_TEST_API_KEY || '',
              'Content-Length': Buffer.byteLength(body),
            },
            timeout: 600000,
          }, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              const result = JSON.parse(data);
              console.log('GateTest live-deploy results against ' + process.env.LIVE_URL + ':');
              console.log('  Modules:', result.totalModules, '| Issues:', result.totalIssues, '| Duration:', result.duration + 'ms');
              for (const mod of result.modules || []) {
                const icon = mod.status === 'passed' ? '✅' : '❌';
                console.log('  ' + icon + ' ' + mod.name + ': ' + mod.checks + ' checks, ' + mod.issues + ' issues');
                if (mod.details) mod.details.forEach(d => console.log('    → ' + d));
              }
              if (result.totalIssues > 0) {
                console.error('GateTest found ' + result.totalIssues + ' issue(s) on live site');
                process.exit(1);
              }
            });
          });
          req.on('error', (e) => { console.error('GateTest API error:', e.message); process.exit(1); });
          req.write(body);
          req.end();
          "
        env:
          LIVE_URL: ${{ github.event.deployment_status.target_url || inputs.url || 'https://zoobicon.com' }}
          GATE_TEST_API_URL: ${{ secrets.GATE_TEST_API_URL }}
          GATE_TEST_API_KEY: ${{ secrets.GATE_TEST_API_KEY }}

      - name: Skip notice (no GateTest secrets)
        if: ${{ env.GATE_TEST_API_URL == '' }}
        run: |
          echo "::notice::GATE_TEST_API_URL not configured — skipping post-deploy GateTest."
          echo "Set repo secrets GATE_TEST_API_URL and GATE_TEST_API_KEY to enable."
        env:
          GATE_TEST_API_URL: ${{ secrets.GATE_TEST_API_URL }}
