name: Post-Deploy Verification

# Runs automatically after every Vercel deployment succeeds
# Also runnable manually for ad-hoc testing
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test against'
        default: 'https://zoobicon.com'

jobs:
  smoke-tests:
    name: Smoke Tests
    # Only run when deployment succeeds (or manual trigger)
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run smoke tests against live site
        run: bash scripts/smoke-test.sh "$SMOKE_URL"
        env:
          SMOKE_URL: ${{ github.event.deployment_status.target_url || inputs.url || 'https://zoobicon.com' }}

  playwright-e2e:
    name: E2E Tests (Playwright)
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Run Playwright E2E tests against live site
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url || inputs.url || 'https://zoobicon.com' }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
