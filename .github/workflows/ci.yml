name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Quality Gate → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Quality Gate
        run: node scripts/quality-gate.js

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm test


      - name: Build
        run: npm run build
        env:
          # Dummy keys so build succeeds in CI (API routes are not called at build time)
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          ADMIN_EMAIL: admin@zoobicon.com
          ADMIN_PASSWORD: ci-placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          STRIPE_SECRET_KEY: sk_test_ci_placeholder

  gatetest:
    name: GateTest Quality Gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run site scanner
        run: node scripts/site-scanner.js

      - name: Run GateTest API scan
        if: ${{ env.GATE_TEST_API_URL != '' }}
        run: |
          node -e "
          const https = require('https');
          const url = new URL(process.env.GATE_TEST_API_URL);
          const body = JSON.stringify({
            repo_url: 'https://github.com/${{ github.repository }}',
            tier: 'full',
            ref: '${{ github.sha }}'
          });
          const req = https.request({
            hostname: url.hostname,
            port: url.port || 443,
            path: url.pathname,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': process.env.GATE_TEST_API_KEY || '',
              'Content-Length': Buffer.byteLength(body)
            },
            timeout: 60000
          }, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              const result = JSON.parse(data);
              console.log('Gate Test Results:');
              console.log('  Modules:', result.totalModules, '| Issues:', result.totalIssues, '| Duration:', result.duration + 'ms');
              for (const mod of result.modules || []) {
                const icon = mod.status === 'passed' ? '✅' : '❌';
                console.log('  ' + icon + ' ' + mod.name + ': ' + mod.checks + ' checks, ' + mod.issues + ' issues');
                if (mod.details) mod.details.forEach(d => console.log('    → ' + d));
              }
              if (result.totalIssues > 0) {
                console.error('Gate Test found ' + result.totalIssues + ' issue(s)');
                process.exit(1);
              }
            });
          });
          req.on('error', (e) => { console.error('Gate Test API error:', e.message); process.exit(1); });
          req.write(body);
          req.end();
          "
        env:
          GATE_TEST_API_URL: ${{ secrets.GATE_TEST_API_URL }}
          GATE_TEST_API_KEY: ${{ secrets.GATE_TEST_API_KEY }}
    continue-on-error: false
